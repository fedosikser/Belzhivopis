<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>БелЖивапіс</title>
    <meta
      name="description"
      content="БелЖивапіс — сайт проекта по брендингу выставки белорусской живописи."
    />
    <link rel="preload" href="./шрифты/Racama.otf" as="font" type="font/otf" crossorigin />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="site-header__top">
          <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-menu">
            <span class="menu-toggle__icon" aria-hidden="true">
              <span></span>
              <span></span>
            </span>
            <span>Меню</span>
          </button>

          <a class="brand" href="./index.html" aria-label="Главная страница">
            <span class="brand__title">БелЖивапіс</span>
            <span class="brand__subtitle">Минск</span>
          </a>

          <button class="search-toggle" type="button" aria-label="Поиск">
            <span>Поиск</span>
            <span class="search-toggle__icon" aria-hidden="true"></span>
          </button>
        </div>

        <nav class="site-header__bottom" aria-label="Основная навигация">
          <a href="#screen-2">Новости</a>
          <a href="#screen-5">Выставки</a>
          <a href="#tickets">Билеты</a>
          <a href="#screen-12">Архив</a>
          <a href="#footer">Контакты</a>
        </nav>
      </header>

      <nav class="site-menu" id="site-menu" aria-hidden="true">
        <div class="site-menu__inner">
          <a href="./index.html">Главная</a>
          <a href="#screen-2">Концепция</a>
          <a href="#screen-7">Плакаты</a>
          <a href="#tickets">Билеты</a>
          <a href="#screen-12">Носители</a>
        </div>
      </nav>

      <main>
        <section class="hero" id="hero">
          <h1 class="visually-hidden">БелЖивапіс Минск</h1>
          <div class="hero__backdrop">
            <img src="./webP/1.webp" alt="Выставочный зал БелЖивапіс" />
          </div>
        </section>

        <section class="media-screen media-screen--text reveal" id="screen-2">
          <img src="./webP/2.webp" alt="Описание выставки" />
        </section>

        <section class="media-screen media-screen--video reveal" id="screen-video-1">
          <video autoplay muted loop playsinline preload="metadata">
            <source src="./webM/1.webm" type="video/webm" />
          </video>
        </section>

        <section class="media-screen reveal" id="screen-5">
          <img src="./webP/5.webp" alt="Логотип выставки на холсте" />
        </section>

        <section class="media-screen media-screen--text reveal" id="screen-6">
          <img src="./webP/6.webp" alt="Исследование и сбор ассоциаций" />
        </section>

        <section class="media-screen reveal" id="screen-7">
          <img src="./webP/7.webp" alt="Плакат Марка Шагала" />
        </section>

        <section class="media-screen reveal" id="screen-8">
          <img src="./webP/8.webp" alt="Плакат Михаила Савицкого" />
        </section>

        <section class="media-screen reveal" id="screen-9">
          <img src="./webP/9.webp" alt="Альтернативный постер проекта" />
        </section>

        <section class="media-screen media-screen--text reveal" id="screen-10">
          <img src="./webP/10.webp" alt="Описание дизайна входного билета" />
        </section>

        <section class="tickets reveal" id="tickets">
          <div class="section-head">
            <p>БИЛЕТЫ</p>
            <h2>СЕРИЯ ВХОДНЫХ БИЛЕТОВ И ВАРИАЦИЙ АЙДЕНТИКИ</h2>
          </div>

          <div class="tickets__grid">
            <figure class="ticket-card ticket-card--wide">
              <img src="./webP/11.webp" alt="Серия билетов выставки" />
            </figure>
            <figure class="ticket-card">
              <img src="./webP/11_clear.webp" alt="Чистая композиция билетов" />
            </figure>
            <figure class="ticket-card">
              <img src="./webP/новый билет 1.webp" alt="Вариант билета 1" />
            </figure>
            <figure class="ticket-card">
              <img src="./webP/новый билет 2.webp" alt="Вариант билета 2" />
            </figure>
            <figure class="ticket-card">
              <img src="./webP/новый билет 3.webp" alt="Вариант билета 3" />
            </figure>
          </div>
        </section>

        <section class="media-screen reveal" id="screen-12">
          <img src="./webP/12.webp" alt="Плакат и билетная система проекта" />
        </section>

        <section class="media-screen reveal" id="screen-13">
          <img src="./webP/13.webp" alt="Постер выставки на синем стуле" />
        </section>

        <section class="media-screen media-screen--video media-screen--logo reveal" id="screen-video-logo">
          <video autoplay muted loop playsinline preload="metadata">
            <source src="./webM/лого_аним(поверх 2 ставить).webm" type="video/webm" />
          </video>
        </section>
      </main>

      <footer class="site-footer" id="footer">
        <div class="site-footer__inner">
          <p>БЕЛЖИВАПІС</p>
          <p>ПРОЕКТ БРЕНДИНГА ВЫСТАВКИ</p>
          <p>2025</p>
        </div>
      </footer>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
